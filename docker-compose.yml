services:
  postgres:
    image: postgres:16-alpine
    container_name: sports-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sports_shop_platform
      POSTGRES_USER: sports_shop
      POSTGRES_PASSWORD: sports_shop_password
    ports:
      - "5432:5432"
    volumes:
      - sports_shop_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sports_shop -d sports_shop_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sports_shop_postgres:
